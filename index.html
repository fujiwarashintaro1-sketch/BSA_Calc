<!DOCTYPE html>
<!-- index.htmlの中に直接追加する注意事項の例 -->
<div style="margin-top: 30px; padding: 15px; border-top: 1px solid #eee; font-size: 0.8rem; color: #666; text-align: left;">
    <h3 style="font-size: 0.9rem; color: #333;">【注意事項】</h3>
    <ul>
        <li>本ツールは BSA 0.01 ～ 1.50 に対応しています。</li>
        <li>入力値に最も近い基準値を表示します。</li>
        <li><strong>免責事項：</strong>本ツールは参照用です。臨床的判断は必ず専門医が行ってください。</li>
    </ul>
</div>

<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LVDd,LVDs,LADs</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #7f8c8d;
            font-weight: bold;
        }
        input[type="number"] {
            width: 80%;
            padding: 0.8rem;
            font-size: 1.2rem;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            border-color: #3498db;
        }
        .results {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 1rem;
        }
        .result-card {
            background: #f8f9fa;
            padding: 1rem 0.5rem;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .label {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-bottom: 0.3rem;
        }
        .value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .info {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #95a5a6;
        }
        .error {
            color: #e74c3c;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BSA 基準値検索</h1>
    
    <div class="input-group">
        <label for="bsaInput">BSA (m²)</label>
        <input type="number" id="bsaInput" step="0.01" placeholder="例: 0.85" min="0.01" max="1.5">
    </div>

    <div id="errorMessage" class="error"></div>

    <div class="results">
        <div class="result-card">
            <div class="label">LVDd</div>
            <div id="lvddValue" class="value">-</div>
        </div>
        <div class="result-card">
            <div class="label">LVDs</div>
            <div id="lvdsValue" class="value">-</div>
        </div>
        <div class="result-card">
            <div class="label">LADs</div>
            <div id="ladsValue" class="value">-</div>
        </div>
    </div>

    <div class="info">
        <p>対応範囲: BSA 0.01 ～ 1.50</p>
    </div>
</div>

<script>
    // CSVデータを配列として定義

    // データをパースしてオブジェクトの配列にする
    const data = rawData.split('\n').map(line => {
        const [bsa, lvdd, lvds, lads] = line.split(',').map(Number);
        return { bsa, lvdd, lvds, lads };
    });

    const bsaInput = document.getElementById('bsaInput');
    const lvddValue = document.getElementById('lvddValue');
    const lvdsValue = document.getElementById('lvdsValue');
    const ladsValue = document.getElementById('ladsValue');
    const errorMessage = document.getElementById('errorMessage');

    bsaInput.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        
        if (isNaN(val)) {
            clearDisplay();
            return;
        }

        if (val < 0.01 || val > 1.5) {
            errorMessage.textContent = "範囲外です (0.01-1.50)";
            clearDisplay();
            return;
        } else {
            errorMessage.textContent = "";
        }

        // 最も近いBSA値を検索
        const closest = data.reduce((prev, curr) => {
            return (Math.abs(curr.bsa - val) < Math.abs(prev.bsa - val) ? curr : prev);
        });

        lvddValue.textContent = closest.lvdd;
        lvdsValue.textContent = closest.lvds;
        ladsValue.textContent = closest.lads;
    });

    function clearDisplay() {
        lvddValue.textContent = "-";
        lvdsValue.textContent = "-";
        ladsValue.textContent = "-";
    }
</script>

</html>
